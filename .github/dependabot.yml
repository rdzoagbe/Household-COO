version: 2
updates:
  # Version-update PRs are intentionally paused while Household COO stabilizes
  # Expo/dev-client, Google auth, notifications, and the UI redesign. Security
  # alerts can still be reviewed separately from the repository Security tab.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
