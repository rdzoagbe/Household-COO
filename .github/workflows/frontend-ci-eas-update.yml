name: Frontend CI and Expo update

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-eas-update.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend lint check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

  expo-update:
    name: Publish Android EAS update
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL || vars.EXPO_PUBLIC_BACKEND_URL }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID || vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID || vars.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Skip when EXPO_TOKEN is not configured
        if: env.EXPO_TOKEN == ''
        run: |
          echo "EXPO_TOKEN is not configured as a GitHub secret."
          echo "Skipping EAS Update. Add EXPO_TOKEN to enable Expo updates on expo.dev."

      - name: Checkout repository
        if: env.EXPO_TOKEN != ''
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: env.EXPO_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: env.EXPO_TOKEN != ''
        run: npm ci

      - name: Validate public Expo environment
        if: env.EXPO_TOKEN != ''
        run: |
          if [ -z "$EXPO_PUBLIC_BACKEND_URL" ]; then
            echo "Missing EXPO_PUBLIC_BACKEND_URL. Add it as a GitHub Actions secret or repository variable."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" ]; then
            echo "Missing EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID. Add it as a GitHub Actions secret or repository variable."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID" ]; then
            echo "Missing EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID. Add it as a GitHub Actions secret or repository variable."
            exit 1
          fi

      - name: Publish Android update to Expo production branch
        if: env.EXPO_TOKEN != ''
        run: npx eas-cli@latest update --platform android --branch production --environment production --message "GitHub $GITHUB_SHA" --non-interactive
