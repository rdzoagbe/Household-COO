name: Frontend CI and Expo update

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-eas-update.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-eas-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Frontend lint check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint --if-present

  expo-update:
    name: Publish Android EAS update
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/main'
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL || vars.EXPO_PUBLIC_BACKEND_URL }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID || vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID || vars.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_NO_TELEMETRY: 1
    steps:
      - name: Check Expo publish configuration
        id: expo_config
        shell: bash
        run: |
          missing=()

          if [ -z "$EXPO_TOKEN" ]; then
            missing+=("EXPO_TOKEN")
          fi
          if [ -z "$EXPO_PUBLIC_BACKEND_URL" ]; then
            missing+=("EXPO_PUBLIC_BACKEND_URL")
          fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" ]; then
            missing+=("EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID")
          fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID" ]; then
            missing+=("EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Expo update is skipped because the following GitHub Actions secrets/variables are missing: ${missing[*]}"
            echo "Add them under Repository > Settings > Secrets and variables > Actions to enable automatic EAS updates."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Expo publish configuration found. Continuing with EAS update."
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.expo_config.outputs.publish == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.expo_config.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.expo_config.outputs.publish == 'true'
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Publish Android update to Expo production branch
        if: steps.expo_config.outputs.publish == 'true'
        working-directory: frontend
        run: |
          npx eas-cli@latest update \
            --platform android \
            --branch production \
            --environment production \
            --message "GitHub $GITHUB_SHA" \
            --non-interactive
