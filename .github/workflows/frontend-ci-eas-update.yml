name: Frontend CI and Expo update

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-eas-update.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend lint check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

  expo-update:
    name: Publish EAS update
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Skip when EXPO_TOKEN is not configured
        if: env.EXPO_TOKEN == ''
        run: |
          echo "EXPO_TOKEN is not configured as a GitHub secret."
          echo "Skipping EAS Update. Add EXPO_TOKEN to enable Expo updates on expo.dev."

      - name: Checkout repository
        if: env.EXPO_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.EXPO_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: env.EXPO_TOKEN != ''
        run: npm ci

      - name: Publish update to Expo production branch
        if: env.EXPO_TOKEN != ''
        run: npx eas-cli@latest update --branch production --environment production --message "GitHub $GITHUB_SHA" --non-interactive
